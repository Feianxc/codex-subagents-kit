name: Bug report
description: 报告 skill、脚本、触发、测试或仓库问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题概述
      description: 简要描述发生了什么
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 请给出尽量稳定的复现步骤、prompt、命令或路径
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 证据
      description: 可附 run id、report 路径、日志片段、截图等

