name: validate

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate skill directory
        run: python scripts/quick_validate_skill.py --skill-dir skills/codex-subagents-kit

      - name: Validate repository layout
        run: python scripts/validate_release_repo.py --repo-root .
